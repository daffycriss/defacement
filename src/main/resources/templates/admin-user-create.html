<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create New User</title>
    <link rel="shortcut icon" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
<!-- Flash messages -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: body}"></div>

<div class="d-flex justify-content-center align-items-start min-vh-100 content-wrapper">
    <main class="page-container">

        <h1>Create New User Form</h1>

        <div class="d-flex justify-content-center align-items-start min-vh-100 bg-dark py-5">
            <div class="card p-4 shadow-sm form-card">
                <div class="card-body">
                    <h4 class="card-title text-center mb-4">Create New User</h4>

                    <div th:if="${error}" style="color: red;">
                        <p th:text="${error}"></p>
                    </div>

                    <form th:action="@{/admin/users/new}" method="post" th:object="${user}">

                        <div class="mb-3 row">
                            <label for="username" class="col-sm-5 col-form-label text-end">Username:</label>
                            <div class="col-sm-7">
                                <input type="text" th:field="*{username}" class="form-control" id="username" name="username" required>
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label for="password" class="col-sm-5 col-form-label text-end">Password:</label>
                            <div class="col-sm-7">
                                <input type="password" class="form-control" id="password" name="password" required
                                       pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*()_+\-=\[\]{};':\|,.<>\/?]).{8,}&quot;" title="At least 8 chars, include uppercase, lowercase, number, special char">
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label for="firstName" class="col-sm-5 col-form-label text-end">First Name:</label>
                            <div class="col-sm-7">
                                <input type="text" th:field="*{firstName}" class="form-control" id="firstName" name="firstName" required>
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label for="lastName" class="col-sm-5 col-form-label text-end">Last Name:</label>
                            <div class="col-sm-7">
                                <input type="text" th:field="*{lastName}" class="form-control" id="lastName" name="lastName" required>
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label for="dateOfBirth" class="col-sm-5 col-form-label text-end">Date of Birth:</label>
                            <div class="col-sm-7">
                                <input type="date" th:field="*{dateOfBirth}" class="form-control" id="dateOfBirth" name="dateOfBirth" required>
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label class="col-sm-5 col-form-label text-end">Sex:</label>
                            <div class="col-sm-7">
                                <select th:field="*{sex}" class="form-select" required>
                                    <option value="">-- Select --</option>
                                    <option th:each="s : ${sexes}"
                                            th:value="${s}"
                                            th:text="${s}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label for="idNumber" class="col-sm-5 col-form-label text-end">ID Number:</label>
                            <div class="col-sm-7">
                                <input type="text" th:field="*{idNumber}" class="form-control" id="idNumber" name="idNumber" required>
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label class="col-sm-5 col-form-label text-end">Role:</label>
                            <div class="col-sm-7">
                                <select name="roleId" class="form-select" required>
                                    <option value="">-- Select --</option>
                                    <option th:each="role : ${roles}"
                                            th:value="${role.id}"
                                            th:text="${role.name}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex justify-content-center gap-2 mt-4">
                            <button class="btn btn-primary" type="submit">Create User</button>
                            <a th:href="@{/admin/users}" class="btn btn-secondary">Back to Users List</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/autohideflashmessagesafterfiveseconds.js}"></script>

</body>
</html>
