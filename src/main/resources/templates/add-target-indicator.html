<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Indicator to Target</title>
    <link rel="shortcut icon" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
<!-- Flash messages -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: body}"></div>

<div class="d-flex justify-content-center align-items-start min-vh-100 content-wrapper">
    <main class="page-container">
        <h1 th:text="'Add Indicator to ' + ${target.name}">Add Indicator</h1>
        <div class="d-flex justify-content-center align-items-start min-vh-100 bg-dark py-5">
            <div class="card p-4 shadow-sm form-card">
                <div class="card-body">
                    <h4 class="card-title text-center mb-4">Add Indicator</h4>

                    <form th:action="@{'/targets/' + ${target.id} + '/indicators'}" method="post">
                        <div class="mb-3">
                            <label for="indicatorSelect">Choose Indicator:</label>
                            <select name="indicatorId" id="indicatorSelect" class="form-select" required>
                                <option th:each="indicator : ${availableIndicators}"
                                        th:value="${indicator.id}"
                                        th:text="${'(' + indicator.type + ') ' + indicator.value}">
                                </option>
                            </select>
                        </div>
                        <div class="d-flex justify-content-center gap-2 mt-4">
                            <button type="submit" class="btn btn-sm btn-warning">Assign Indicator</button>
                            <a th:href="@{'/targets/' + ${target.id} + '/indicators'}" class="btn btn-secondary">Back to Indicators</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </main>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/autohideflashmessagesafterfiveseconds.js}"></script>

</body>
</html>
