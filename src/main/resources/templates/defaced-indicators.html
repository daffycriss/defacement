<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Defacement Dashboard</title>
    <link rel="shortcut icon" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
<!-- Flash messages -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: body}"></div>

<div class="align-items-start min-vh-100 content-wrapper">
    <main class="page-container text-light rounded">
        <h1 class="text-center mb-4">Defaced Indicators</h1>
        <div class="admin-container mx-auto">
            <div class="card p-4 shadow-sm form-card">
                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Indicator</th>
                            <th style="text-align:center">Target</th>
                            <th style="text-align:center">Scan Time</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="ind, iterStat : ${defacedIndicators}">
                            <td th:text="${iterStat.count}"></td>
                            <!-- this will not work; use iterStat.index + 1 instead -->
                            <td th:text="${ind}"></td>
                            <td style="text-align:center"> <!-- target name if needed --></td>
                            <td style="text-align:center"> <!-- scan time if needed --></td>
                        </tr>
                        </tbody>
                    </table>
                    <div class="d-flex justify-content-center gap-2 mt-4">
                        <a th:href="@{/dashboard}" class="btn btn-secondary justify-content-center gap-2 mt-4">Back to
                            Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/autohideflashmessagesafterfiveseconds.js}"></script>

</body>
</html>
