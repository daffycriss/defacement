<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Log Viewer</title>
    <link rel="shortcut icon" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: monospace;
            font-size: 0.8rem;
            padding: 1rem;
            border-radius: 8px;
            height: 70vh;
            overflow-y: auto;
        }
        .log-line { margin: 0; padding: 1px 0; border-bottom: 1px solid #2d2d2d; }
        .log-line.ERROR  { color: #f44747; }
        .log-line.WARN   { color: #ffcc00; }
        .log-line.INFO   { color: #9cdcfe; }
        .log-line.DEBUG  { color: #888; }
    </style>
</head>
<body class="bg-dark text-light">
<!-- Flash messages -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: body}"></div>

<div class="align-items-start min-vh-100 content-wrapper">
    <main class="page-container text-light rounded">
        <h1 class="text-center mb-4">Application Logs</h1>
        <div class="admin-container mx-auto">
            <div class="card p-4 shadow-sm form-card">
                <div class="card-body">
                    <!-- Filters -->
                    <form method="get" th:action="@{/logs}" class="row g-2 mb-3">
                        <div class="col-auto">
                            <input type="text" name="keyword" class="form-control form-control-sm"
                                   placeholder="Search keyword" th:value="${keyword}"/>
                        </div>
                        <div class="col-auto">
                            <select name="level" class="form-select form-select-sm">
                                <option value="">All levels</option>
                                <option value="INFO"  th:selected="${level == 'INFO'}">INFO</option>
                                <option value="WARN"  th:selected="${level == 'WARN'}">WARN</option>
                                <option value="ERROR" th:selected="${level == 'ERROR'}">ERROR</option>
                                <option value="DEBUG" th:selected="${level == 'DEBUG'}">DEBUG</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <select name="lines" class="form-select form-select-sm">
                                <option value="100"  th:selected="${lines == 100}">Last 100</option>
                                <option value="200"  th:selected="${lines == 200}">Last 200</option>
                                <option value="500"  th:selected="${lines == 500}">Last 500</option>
                                <option value="1000" th:selected="${lines == 1000}">Last 1000</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button type="submit" class="btn btn-sm btn-primary">Filter</button>
                            <a th:href="@{/logs}" class="btn btn-sm btn-secondary">Reset</a>
                        </div>
                    </form>

                    <!-- Log Output -->
                    <div class="log-container" id="logContainer">
                        <div th:each="line : ${logs}"
                             th:text="${line}"
                             th:classappend="${#strings.contains(line,'ERROR')} ? 'ERROR' : (${#strings.contains(line,'WARN')} ? 'WARN' : (${#strings.contains(line,'DEBUG')} ? 'DEBUG' : 'INFO'))"
                             class="log-line">
                        </div>
                    </div>

                    <small class="text-muted mt-1 d-block">
                        Showing <span th:text="${#lists.size(logs)}"></span> log entries.
                    </small>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/autohideflashmessagesafterfiveseconds.js}"></script>
<script th:src="@{/js/userdeletionconfirmation.js}"></script>
<script>
    // Auto-scroll to bottom on load
    const container = document.getElementById('logContainer');
    container.scrollTop = container.scrollHeight;
</script>
</body>
</html>
