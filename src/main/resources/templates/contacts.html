<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Contacts</title>
    <link rel="shortcut icon" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">

<!-- Include navbar -->
<div th:replace="~{fragments/navbar :: body}"></div>

<div class="align-items-start min-vh-100 content-wrapper">
    <main class="page-container container mt-5 mb-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">

                <h1 class="mb-3 text-center">Contact Us</h1>
                <p class="text-center text-muted mb-4">
                    Have a question, issue, or suggestion? We’d love to hear from you.
                </p>

                <div class="row">
                    <!-- Contact Info -->
                    <div class="col-md-6 mb-4">
                        <h5>Contacts Details</h5>
                        <p class="mb-1"><strong>Email:</strong> email </p>
                        <p class="mb-1"><strong>Phone:</strong> telephone </p>
                    </div>

                    <!-- Contact Form (static for now) -->
                    <div class="col-md-6">
                        <h5>Send us a message</h5>

                        <form>
                            <div class="mb-3">
                                <label class="form-label">Your Name</label>
                                <input type="text" class="form-control" placeholder="John Doe" disabled>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Your Email</label>
                                <input type="email" class="form-control" placeholder="john@example.com" disabled>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Message</label>
                                <textarea class="form-control" rows="4" placeholder="Coming soon…" disabled></textarea>
                            </div>

                            <button class="btn btn-secondary w-100" disabled>
                                Contact form coming soon
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>
</div>

<!-- Footer include -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
