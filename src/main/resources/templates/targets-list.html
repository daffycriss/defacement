<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Defacement Targets</title>
    <link rel="shortcut icon" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
<!-- Flash messages -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: body}"></div>

<div class="align-items-start min-vh-100 content-wrapper">
    <main class="page-container text-light rounded">
        <h1 class="text-center mb-4">Monitor Targets</h1>
        <div class="admin-container mx-auto">
            <div class="card p-4 shadow-sm form-card">
                <div class="card-body">
                    <!-- Add new target button -->
                    <a class="btn btn-primary mb-3" th:href="@{/targets/new}">Add New Target</a>
                    <table class="table table-striped">
                        <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Base URL</th>
                            <th style="text-align:center">Scan Enabled</th>
                            <th style="text-align:center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="target : ${targets}">
                            <td th:text="${target.name}"></td>
                            <td th:text="${target.baseUrl}"></td>
                            <td style="text-align:center">
                                <span th:text="${target.scanEnabled} ? 'Yes' : 'No'"
                                      th:classappend="${target.scanEnabled} ? 'text-success' : 'text-danger'"></span>
                            </td>
                            <td style="text-align:center">
                                <a th:href="@{|/targets/${target.id}/edit|}" class="btn btn-sm btn-warning">Edit</a>
                                <a th:href="@{|/targets/${target.id}/delete|}" class="btn btn-sm btn-danger"
                                   onclick="return confirm('Are you sure?');">Delete</a>
                                <a th:href="@{|/targets/${target.id}/indicators|}" class="btn btn-sm btn-info">View
                                    Indicators</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/autohideflashmessagesafterfiveseconds.js}"></script>

</body>
</html>
