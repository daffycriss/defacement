<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Users</title>
    <link rel="shortcut icon" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
<!-- Flash messages -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: body}"></div>

<div class="align-items-start min-vh-100 content-wrapper">
    <main class="page-container text-light rounded">
        <h1 class="text-center mb-4">All Users</h1>
        <div class="admin-container mx-auto">
            <div class="card p-4 shadow-sm form-card">
                <div class="card-body">
                    <table class="table table-striped table-bordered align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>Username</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Date of Birth</th>
                            <th>Sex</th>
                            <th>ID Number</th>
                            <th>Roles</th>
                            <th colspan="3" style="text-align:center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.firstName}"></td>
                            <td th:text="${user.lastName}"></td>

                            <td th:text="${user.dateOfBirth != null ? #temporals.format(user.dateOfBirth, 'dd/MM/yyyy') : '-'}"></td>

                            <td th:text="${user.sex != null ? user.sex.name() : '-'}"></td>

                            <td th:text="${user.idNumber != null ? user.idNumber : '-'}"></td>

                            <td>
        <span th:each="role, stat : ${user.roles}">
          <span th:text="${role.name}"></span>
          <span th:if="${!stat.last}">, </span>
        </span>
                            </td>

                            <td class="text-center">
                                <form th:if="${!user.systemUser}"
                                      th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                                      method="post"
                                      style="display:inline"
                                      th:onsubmit="return confirmDelete([[${user.username}]])">

                                    <button class="btn btn-sm btn-danger" type="submit">
                                        Delete
                                    </button>
                                </form>

                                <span class="badge bg-secondary" th:if="${user.systemUser}">Protected</span>
                            </td>

                            <td class="text-center">
                                <a th:if="${!user.systemUser}"
                                   th:href="@{/admin/users/{id}/edit(id=${user.id})}"
                                   class="btn btn-sm btn-warning">
                                    Edit
                                </a>

                                <span class="badge bg-secondary" th:if="${user.systemUser}">Protected</span>
                            </td>

                            <td class="text-center">
                                <!-- CHANGE PASSWORD -->
                                <a th:href="@{/admin/users/{id}/password(id=${user.id})}"
                                   th:if="${!user.systemUser}">
                                    <button class="btn btn-sm btn-info">Change Password</button>
                                </a>
                                <span class="badge bg-secondary" th:if="${user.username == 'admin'}">Protected</span>
                            </td>

                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/autohideflashmessagesafterfiveseconds.js}"></script>
<script th:src="@{/js/userdeletionconfirmation.js}"></script>

</body>
</html>
