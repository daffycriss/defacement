<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Targets</title>
    <link rel="shortcut icon" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
<!-- Flash messages -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: body}"></div>

<div class="d-flex justify-content-center align-items-start min-vh-100 content-wrapper">
    <main class="page-container">

        <h1 th:text="${target.id} != null ? 'Edit Target' : 'Add Target'"></h1>

        <div class="d-flex justify-content-center align-items-start min-vh-100 bg-dark py-5">
            <div class="card p-4 shadow-sm form-card">
                <div class="card-body">
                    <h4 class="card-title text-center mb-4" th:text="${target.id} != null ? 'Edit Target' : 'Add Target'"></h4>

                    <div th:if="${error}" style="color: red;">
                        <p th:text="${error}"></p>
                    </div>

                    <form th:action="@{/targets/save}" th:object="${target}" method="post">
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" th:field="*{name}" class="form-control"/>
                            <div th:if="${#fields.hasErrors('name')}" class="text-danger" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Base URL</label>
                            <input type="text" th:field="*{baseUrl}" class="form-control"/>
                            <div th:if="${#fields.hasErrors('baseUrl')}" class="text-danger"
                                 th:errors="*{baseUrl}"></div>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" th:field="*{scanEnabled}" class="form-check-input"/>
                            <label class="form-check-label">Scan Enabled</label>
                        </div>

                        <div class="mb-3">
                            <label for="indicators" class="form-label">Indicators</label>
                            <select class="form-select" id="indicators" th:field="*{indicators}" multiple>
                                <option th:each="ind : ${allIndicators}"
                                        th:value="${ind.id}"
                                        th:text="${ind.value}"
                                        th:selected="${target.indicators.contains(ind)}">
                                </option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-center gap-2 mt-4">
                            <button type="submit" class="btn btn-success">Save</button>
                            <a th:href="@{/targets}" class="btn btn-secondary">Cancel</a>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </main>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/autohideflashmessagesafterfiveseconds.js}"></script>

</body>
</html>
