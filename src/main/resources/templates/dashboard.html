<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Defacement Dashboard</title>
    <link rel="shortcut icon" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
<!-- Flash messages -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: body}"></div>
<div class="align-items-start min-vh-100 content-wrapper">
    <main class="page-container text-light rounded">
        <h1 class="text-center mb-4">Dashboard</h1>
        <div class="admin-container mx-auto">
            <div class="card p-4 shadow-sm form-card">
                <div class="card-body">

                    <div class="row mb-4 justify-content-center">
                        <div class="col-md-2">
                            <div class="card text-bg-primary text-center">
                                <div class="card-body">
                                    <h5>Total Targets</h5>
                                    <h3 th:text="${summary.totalTargets}"></h3>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-2">
                            <div class="card text-bg-success text-center">
                                <div class="card-body">
                                    <h5>Healthy Targets</h5>
                                    <h3 th:text="${summary.healthyTargets}"></h3>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-2">
                            <a th:href="@{/dashboard/defaced-indicators}" class="text-decoration-none">
                                <div class="card text-bg-danger text-center hover-scale">
                                    <div class="card-body">
                                        <h5>Defaced Indicators</h5>
                                        <h3 id="defacedCount"
                                            th:text="${#lists.size(defacedIndicators)}">
                                        </h3>
                                    </div>
                                </div>
                            </a>
                        </div>

                        <div class="col-md-2">
                            <div class="card text-bg-danger text-center hover-scale">
                                <div class="card-body">
                                    <h5>Defaced Targets</h5>
                                    <h3 id="realtime-defaced-count">0</h3>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-2">
                            <div class="card text-bg-warning text-center">
                                <div class="card-body">
                                    <h5>Scan Errors</h5>
                                    <h3 th:text="${summary.failedTargets}"></h3>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-2">
                            <div class="card text-bg-dark text-center">
                                <div class="card-body">
                                    <h5>Active Alerts</h5>
                                    <h3 th:text="${summary.activeAlerts}"></h3>
                                </div>
                            </div>
                        </div>
                    </div>
                    <table class="table table-bordered table-striped">
                        <thead class="table-dark">
                        <tr>
                            <th>Site Name</th>
                            <th>Base URL</th>
                            <th style="text-align: center;">Status</th>
                            <th style="text-align: center;">Failed Indicators</th>
                            <th style="text-align: center;">Last Scan</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="target : ${targets}" th:attr="data-target-id=${target.targetId}">
                            <td th:text="${target.targetName}"></td>
                            <td><a th:href="${target.baseUrl}" th:text="${target.baseUrl}" target="_blank"></a></td>
                            <td style="text-align: center;">
                            <span class="badge"
                                  th:classappend="${target.status == 'OK' ? ' bg-success' :
                           target.status == 'DEFACED' ? ' bg-danger' :
                           target.status == 'ERROR' ? ' bg-warning text-dark' :
                           ' bg-secondary'}"
                                  th:text="${target.status == 'DEFACED' ? 'POSSIBLE DEFACEMENT DETECTED' : target.status}">
                            </span>
                            </td>

                            <td class="failed-indicators-count" th:text="${target.failedIndicatorsCount}"
                                style="text-align: center;"></td>
                            <td th:text="${target.lastScanTime != null ? #temporals.format(target.lastScanTime, 'dd-MM-yyyy HH:mm') : '—'}"
                                style="text-align: center;"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/autohideflashmessagesafterfiveseconds.js}"></script>
<script th:inline="javascript" th:src="@{/js/ajaxrefreshone.js}"></script>
<script th:src="@{/js/ajaxrefreshtwo.js}"></script>
<script th:src="@{/js/ajaxrefreshthree.js}"></script>
<script th:src="@{/js/ajaxrefreshfour.js}"></script>
<script th:src="@{/js/autorefreshtheentirepageeverythreeminutes.js}"></script>
</body>
</html>
