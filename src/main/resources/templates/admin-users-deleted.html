<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Users</title>
    <link rel="shortcut icon" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
<!-- Flash messages -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: body}"></div>

<div class="align-items-start min-vh-100 content-wrapper">
    <main class="page-container text-light rounded">
        <h1 class="text-center mb-4">Deleted Users</h1>
        <div class="admin-container mx-auto">
            <div class="card p-4 shadow-sm form-card">
                <div class="card-body">

                    <table class="table table-striped table-bordered align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>Username</th>
                            <th>Full Name</th>
                            <th>ID</th>
                            <th>Deleted At</th>
                            <th>Deleted By</th>
                            <th style="text-align:center">Actions</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.firstName + ' ' + user.lastName}"></td>
                            <td th:text="${user.idNumber}"></td>
                            <td th:text="${user.deletedAt}"></td>
                            <td th:text="${user.deletedBy}"></td>

                            <td class="text-center">
                                <form th:action="@{/admin/users/{id}/restore(id=${user.id})}"
                                      method="post"
                                      th:if="${!user.systemUser}"
                                      style="display:inline">
                                    <button class="btn btn-sm btn-warning" type="submit">Restore</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <div class="d-flex justify-content-center gap-2 mt-4">
                        <a th:href="@{/admin/users}" class="btn btn-secondary">Back to Users List</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/autohideflashmessagesafterfiveseconds.js}"></script>

</body>
</html>
