<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change Password</title>
    <link rel="shortcut icon" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
<!-- Flash messages -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<!-- Include navbar -->
<div th:replace="~{fragments/navbar :: body}"></div>

<div class="d-flex justify-content-center align-items-start min-vh-100 content-wrapper">
    <main class="page-container">

        <h1>Password Change Form</h1>

        <div class="d-flex justify-content-center align-items-start min-vh-100 bg-dark py-5">
            <div class="card p-4 shadow-sm form-card">
                <div class="card-body">
                    <h4 class="card-title text-center mb-4">Password Change</h4>

                    <form th:action="@{/change-password}" method="post">
                        <div class="mb-3 row">
                            <label for="oldPassword" class="col-sm-6 col-form-label text-end">Old Password:</label>
                            <div class="col-sm-6">
                                <input type="password" class="form-control" id="oldPassword" name="oldPassword" required>
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label for="newPassword" class="col-sm-6 col-form-label text-end">New Password:</label>
                            <div class="col-sm-6">
                                <input type="password" class="form-control" id="newPassword" name="newPassword" required
                                       pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*()_+\-=\[\]{};':\\|,.<>\/?]).{8,}&quot;"
                                title="At least 8 chars, include uppercase, lowercase, number, special char">
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label for="confirmNewPassword" class="col-sm-6 col-form-label text-end">Confirm New Password:</label>
                            <div class="col-sm-6">
                                <input type="password" class="form-control" id="confirmNewPassword" name="confirmNewPassword" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-center gap-2 mt-4">
                            <button class="btn btn-primary" type="submit">Change Password</button>
                            <a th:href="@{/default}" class="btn btn-secondary">Back</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/autohideflashmessagesafterfiveseconds.js}"></script>

</body>
</html>
