<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Defacement Indicators</title>
    <link rel="shortcut icon" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
<!-- Flash messages -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: body}"></div>

<div class="align-items-start min-vh-100 content-wrapper">
    <main class="page-container text-light rounded">
        <h1 class="text-center mb-4">Monitor Indicators</h1>
        <div class="admin-container mx-auto">
            <div class="card p-4 shadow-sm form-card">
                <div class="card-body">
                    <!-- Add new indicator button -->
                    <a class="btn btn-primary mb-3" th:href="@{/indicators/new}">Add New Indicator</a>
                    <table class="table table-striped">
                        <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Type</th>
                            <th>Value</th>
                            <th>Description</th>
                            <th style="text-align:center">Enabled</th>
                            <th>Created By</th>
                            <th style="text-align:center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="indicator : ${indicators}">
                            <td th:text="${indicator.id}"></td>
                            <td th:text="${indicator.type}"></td>
                            <td>
                                <!-- STRING -->
                                <span th:if="${indicator.type == T(soc.ucd.defacement.model.IndicatorType).STRING}"
                                      th:text="${indicator.value}">
                            </span>

                                <!-- IMAGE_HASH / VIDEO_HASH -->
                                <div th:if="${indicator.type.name() == 'IMAGE_HASH' or indicator.type.name() == 'VIDEO_HASH'}">
                                    <div>
                                        <strong>File Name:</strong>
                                        <span th:text="${indicator.filename ?: '-'}"></span>
                                        <strong>Hash Value:</strong>
                                        <span th:text="${indicator.hashValue ?: '-'}"></span>
                                    </div>
                                </div>
                            </td>

                            <td th:text="${indicator.description}"></td>
                            <td style="text-align:center">
                                <span th:text="${indicator.enabled} ? 'Yes' : 'No'"
                                      th:classappend="${indicator.enabled} ? 'text-success' : 'text-danger'"></span>
                            </td>
                            <td th:text="${indicator.createdBy != null ? indicator.createdBy.username : '-'}"></td>
                            <td style="text-align:center">
                                <a th:href="@{'/indicators/' + ${indicator.id} + '/edit'}"
                                   class="btn btn-sm btn-warning">Edit</a>

                                <!-- Show Disable only if enabled -->
                                <a th:if="${indicator.enabled}"
                                   th:href="@{'/indicators/' + ${indicator.id} + '/disable'}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Are you sure you want to disable this indicator?');">
                                    Disable
                                </a>

                                <!-- Show Enable only if disabled -->
                                <a th:if="${!indicator.enabled}"
                                   th:href="@{'/indicators/' + ${indicator.id} + '/enable'}"
                                   class="btn btn-sm btn-success"
                                   onclick="return confirm('Are you sure you want to enable this indicator?');">
                                    Enable
                                </a>

                                <form th:action="@{'/indicators/' + ${indicator.id} + '/delete'}"
                                      method="post"
                                      style="display:inline;">

                                    <button type="submit"
                                            class="btn btn-sm btn-danger"
                                            onclick="return confirm('Are you sure you want to delete this indicator?\nTHIS ACTION CANNOT BE UNDONE!!');">
                                        Delete
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/autohideflashmessagesafterfiveseconds.js}"></script>

</body>
</html>
