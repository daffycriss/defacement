<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Indicators for ' + ${target.name}">Target Indicators</title>
    <link rel="shortcut icon" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
<!-- Flash messages -->
<div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: body}"></div>

<div class="align-items-start min-vh-100 content-wrapper">
    <main class="page-container text-light rounded">
        <h1 class="text-center mb-4" th:text="'Indicators for ' + ${target.name}">Indicators</h1>
        <div class="admin-container mx-auto">
            <div class="card p-4 shadow-sm form-card">
                <div class="card-body">
                    <!-- Add new indicator button -->
                    <a class="btn btn-primary mb-3" th:href="@{'/targets/' + ${target.id} + '/indicators/new'}">Assign
                        Indicator</a>
                    <table class="table table-striped table-bordered align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Indicator Type</th>
                            <th>Value</th>
                            <th>Description</th>
                            <th style="text-align:center">Status</th>
                            <th style="text-align:center">Actions</th>
                        </tr>
                        <tbody>
                        <tr th:each="ti, iterStat : ${indicators}">
                            <td th:text="${iterStat.count}"></td>
                            <td th:text="${ti.indicator?.type}"></td>
                            <td th:text="${ti.indicator?.value}"></td>
                            <td th:text="${ti.indicator?.description ?: 'N/A'}"></td>
                            <td style="text-align:center"
                                th:text="${ti.indicator?.enabled ? 'Enabled' : 'Disabled'}"></td>
                            <td style="text-align:center">
                                <a th:href="@{'/targets/' + ${target.id} + '/indicators/' + ${ti.id} + '/remove'}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Are you sure you want to remove this indicator from the target?');">
                                    Remove
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <div class="d-flex justify-content-center gap-2 mt-4">
                        <a th:href="@{/targets}" class="btn btn-secondary">Back to Targets</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Include Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/autohideflashmessagesafterfiveseconds.js}"></script>

</body>
</html>
